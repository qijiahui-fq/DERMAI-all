# DermAI - 皮肤药研平台 
DermAI 是一个专为皮肤科转化医学与新药研发设计的工业级智能辅助平台。本项目深度整合了 Open Targets、ChEMBL 和 Europe PMC 全球多组学与药理数据库。

![System Status](https://img.shields.io/badge/System-Active-success)
![React](https://img.shields.io/badge/React-18.x-blue)
![Python](https://img.shields.io/badge/Python-Backend-yellow)

## 🚀 部署说明
本项目通过 GitHub Actions 自动同步至 Hugging Face Spaces。

### 核心功能
* **智能数据大屏 (Dashboard)**
* **AI 靶点识别引擎 (Target ID)**
* **多维皮肤知识图谱 (Knowledge Graph)**

### 目录结构
* `dist/`: 前端静态资源
* `server.py`: 后端服务入口
* `Dockerfile`: 容器配置
