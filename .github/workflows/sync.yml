name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sync@example.com"
          git config --global user.name "HuggingFace Sync"
          mkdir temp_sync
          cp -r dist server.py Dockerfile requirements.txt README.md temp_sync/ || true
          cd temp_sync
          git init
          git checkout -b main
          git add .
          git commit -m "Pure deployment"
          git push --force https://anything:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/NeednottoKnow123/dermai-platform main
